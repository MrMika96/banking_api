[flake8]
max-line-length = 79
import-order-style = google
extend-ignore = E203
exclude =
    .git,
    .venv,
    __pycache__,
    __init__.py,
    */migrations,
    */migrations/*,
per-file-ignores =
application_import_names =
    banking_api,
    banks,
    credit_cards,
    images,
    management,
    tenants,
    users,
    utils
inline-quotes = "